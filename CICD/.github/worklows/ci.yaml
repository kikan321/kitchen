name: Pipeline Completo de Integración Continua (CI)

on:
  push:
    branches: [ "main" ] # Se activa automáticamente al hacer push a la rama main
  workflow_dispatch:     # Te permite activar el pipeline manualmente desde la web de GitHub

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest # Usa una máquina virtual Linux gratuita de GitHub

    steps:
      # =================================================================
      # FASE 1: PREPARACIÓN (Checkout)
      # =================================================================
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      # =================================================================
      # FASE 2: PRE-CONSTRUCCIÓN (Static Testing / Linting)
      # =================================================================
      - name: 2. Ejecutar Linter de Docker (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      # =================================================================
      # FASE 3: CONSTRUCCIÓN (Building / Packaging)
      # =================================================================
      - name: 3. Iniciar sesión de forma segura en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 4. Construir imagen Docker (Localmente en el Runner)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Carga la imagen en el runner local para poder escanearla antes de subirla
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-test:latest

      # =================================================================
      # FASE 4: POST-CONSTRUCCIÓN Y SEGURIDAD (Security Scanning / DevSecOps)
      # =================================================================
      - name: 5. Escanear imagen en busca de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/nginx-test:latest'
          format: 'table'
          exit-code: '0' # Cambia a '1' si quieres que el pipeline falle si encuentra fallos graves
          severity: 'CRITICAL,HIGH'

      # =================================================================
      # FASE 5: PUBLICACIÓN (Publish / Push)
      # =================================================================
      - name: 6. Subir imagen verificada a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true # Ahora sí, la sube a internet porque pasó todos los filtros
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-test:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx-test:${{ github.sha }} # Versión única con el ID del commit
