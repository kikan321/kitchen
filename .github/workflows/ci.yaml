name: Pipeline Completo de Integración Continua (CI)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      # =================================================================
      # 🛠️ PASO 2: ANÁLISIS ESTÁTICO (Hadolint)
      # =================================================================
      - name: 2. Ejecutar Linter de Docker (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: CICD/Dockerfile

      - name: 3. Iniciar sesión de forma segura en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =================================================================
      # 🚀 PASO 4: COMPILACIÓN (Build con el ID del Commit)
      # =================================================================
      - name: 4. Construir imagen Docker (Localmente en el Runner)
        uses: docker/build-push-action@v5
        with:
          context: ./CICD
          load: true # Compila y guarda en la memoria del Runner local
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-test:${{ github.sha }} # <-- Solo usa el SHA largo de Git

      # =================================================================
      # 🛡️ PASO 5: PRUEBA DE SEGURIDAD (Trivy sobre la imagen del Commit)
      # =================================================================
      - name: 5. Escanear imagen en busca de vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/nginx-test:${{ github.sha }}' # <-- Escanea la imagen exacta
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # =================================================================
      # 📦 PASO 6: DISTRIBUCIÓN (Push con el ID del Commit)
      # =================================================================
      - name: 6. Subir imagen verificada a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./CICD
          push: true # Sube la imagen a internet porque superó los pasos previos
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx-test:${{ github.sha }} # <-- Sube la imagen inmutable
